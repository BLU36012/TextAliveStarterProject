<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextAlive CDN Project</title>
  
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 100px;
      background-color: #f4f4f9;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }
    #text {
      display: block;
      font-size: 48px;
      font-weight: bold;
      margin-top: 30px;
      min-height: 60px;
    }
  </style>
</head>
<body>

  <div>
    <button id="play" disabled>Play</button>
    <button id="stop" disabled>Stop</button>
  </div>

  <span id="text">Loading...</span>

  <div id="media"></div>

  <script>
    // Pull Player from the globally loaded TextAliveApp
    const { Player } = TextAliveApp;

    // Initialize the Player
    const player = new Player({
      app: { token: "YOUR_APP_TOKEN" }, // Insert your developer token here
      mediaElement: document.querySelector("#media"),
    });

    // Grab UI elements
    const textSpan = document.querySelector("#text");
    const playBtn = document.querySelector("#play");
    const stopBtn = document.querySelector("#stop");

    // Set up Player listeners
    player.addListener({
      onAppReady: (app) => {
        if (!app.managed) {
          // Load default Piapro song
          player.createFromSongUrl("https://piapro.jp/t/RoPB/20220122172830");
        }
      },

      onVideoReady: () => {
        textSpan.textContent = "Ready! Press Play.";
        playBtn.disabled = false;
        stopBtn.disabled = false;
      },

      onTimeUpdate: (position) => {
        let currentVideo = player.video;
        if (currentVideo) {
          // Find the word currently being sung
          let currentWord = currentVideo.findWord(position);
          textSpan.textContent = currentWord ? currentWord.text : " ";
        }
      }
    });

    // 4. Wire up the buttons
    playBtn.addEventListener("click", () => {
      if (player.isPlaying) {
        player.requestPause();
        playBtn.textContent = "Play";
      } else {
        player.requestPlay();
        playBtn.textContent = "Pause";
      }
    });

    stopBtn.addEventListener("click", () => {
      player.requestStop();
      playBtn.textContent = "Play";
      textSpan.textContent = "Stopped.";
    });
  </script>

</body>
</html>
